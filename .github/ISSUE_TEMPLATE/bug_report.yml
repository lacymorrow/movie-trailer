name: Bug report
description: movie-trailer returned the wrong trailer URL, an error, or no result
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: movie-trailer version
      placeholder: "3.0.1"
    validations:
      required: true

  - type: input
    id: query
    attributes:
      label: Title (and year, if applicable) you queried
      placeholder: "Avatar — 2009"
    validations:
      required: true

  - type: input
    id: env
    attributes:
      label: Where you ran it
      description: Node version, browser, framework (React, Next.js…)
      placeholder: "Node 20, Next.js 14 server"
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: What actually happened?
      description: Full error message / response, please.
      render: shell
    validations:
      required: true
