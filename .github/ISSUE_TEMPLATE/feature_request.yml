name: Feature request
description: Suggest an enhancement (the library is feature-complete, but bug-adjacent ergonomics are welcome)
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        `movie-trailer` is intentionally feature-complete. Ergonomic improvements and small fixes are welcome; new providers or major API changes are likely out of scope.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Your proposed change
